<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kahoot</title>
    <script src="jatos.js"></script>
    <script src="jspsych.js"></script>
    <script src="plugin-call-function.js"></script>
    <script src="plugin-html-button-response.js"></script>
    <script src="plugin-html-keyboard-response.js"></script>
    <script src="plugin-multiplayer-sync.js"></script>
    <script src="jatos-adapter.js"></script>
    <script src="protocol.js"></script>
    <link rel="stylesheet" href="jspsych.css" />
    <style>
      .jspsych-content { max-width: 600px; }

      /* Big tap-friendly answer buttons */
      .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
      .jspsych-btn.answer-btn {
        padding: 28px 12px; font-size: 1.1rem; font-weight: bold;
        border: none; border-radius: 10px; color: #fff; width: 100%;
      }
      .jspsych-btn.answer-btn.red    { background: #e21b3c; }
      .jspsych-btn.answer-btn.blue   { background: #1368ce; }
      .jspsych-btn.answer-btn.yellow { background: #d89e00; }
      .jspsych-btn.answer-btn.green  { background: #26890c; }

      .result-correct { color: #26890c; font-size: 2rem; font-weight: bold; }
      .result-wrong   { color: #e21b3c; font-size: 2rem; font-weight: bold; }
      .points-earned  { font-size: 1.3rem; margin-top: 8px; }
      .total-score    { font-size: 1.1rem; opacity: 0.7; margin-top: 4px; }
    </style>
  </head>
  <body></body>
  <script>
    jatos.onLoad(async () => {
      const jsPsych = initJsPsych({ on_finish: () => jatos.endStudy() });
      await jsPsych.pluginAPI.connect(new jsPsychAdapterMultiplayerJatos());

      // State shared across trials via closure
      let myName = "";
      let hostId = null;
      let myAnswers = {};
      let myTotalScore = 0;
      let lastQuestionIndex = -1;
      let lastChoice = null;
      let lastTimeMs = null;
      let lastPointsEarned = 0;
      let lastCorrect = false;

      // ── 1. Name entry ─────────────────────────────────────────────────────
      const nameTrial = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
          <p style="font-size:1.4rem;margin-bottom:16px">Enter your name:</p>
          <input id="nameInput" type="text" maxlength="20" autofocus
            style="font-size:1.3rem;padding:10px 16px;border-radius:8px;border:2px solid #ccc;width:240px;text-align:center" />
          <p style="margin-top:12px;opacity:0.6">Press Enter to join</p>`,
        choices: ["Enter"],
        on_finish: () => {
          myName = document.getElementById("nameInput")?.value?.trim() || "Player";
        },
      };

      // ── 2. Lobby barrier ──────────────────────────────────────────────────
      const lobbyBarrier = {
        type: jsPsychMultiplayerSync,
        push_data: () => ({ role: "player", name: myName, answers: {}, totalScore: 0 }),
        wait_for: (group) => {
          const hId = getHostId(group);
          // Host has left the lobby (first question started, or further along for a late joiner).
          return hId !== null && hostStepValue(group) >= phaseStep(0, PHASES.QUESTION);
        },
        message: "<p style='font-size:1.2rem'>Waiting for the host to start the game…</p>",
        on_finish: (data) => {
          hostId = getHostId(data.group);
        },
      };

      // ── 3. Question loop ──────────────────────────────────────────────────

      // 3a. Question trial
      const questionTrial = {
        type: jsPsychHtmlButtonResponse,
        stimulus: () => {
          const state = jsPsych.pluginAPI.get(hostId);
          return `<p style="font-size:1.3rem;margin-bottom:4px;opacity:0.6">Question ${(state?.questionIndex ?? 0) + 1}</p>
                  <p style="font-size:1.4rem;font-weight:bold">${state?.questionPrompt ?? ""}</p>`;
        },
        choices: () => {
          const state = jsPsych.pluginAPI.get(hostId);
          return state?.questionChoices ?? [];
        },
        button_html: (choice, choiceIndex) => {
          const colors = ["red", "blue", "yellow", "green"];
          const symbols = ["▲", "◆", "●", "■"];
          return `<button class="jspsych-btn answer-btn ${colors[choiceIndex]}">${symbols[choiceIndex]} ${choice}</button>`;
        },
        trial_duration: () => {
          const state = jsPsych.pluginAPI.get(hostId);
          return state?.questionDurationMs ?? QUESTION_DURATION_MS;
        },
        on_finish: async (data) => {
          const state = jsPsych.pluginAPI.get(hostId);
          lastQuestionIndex = state?.questionIndex ?? 0;
          lastChoice = data.response; // null if timed out
          lastTimeMs = data.response !== null
            ? Math.min(data.rt, state?.questionDurationMs ?? QUESTION_DURATION_MS)
            : state?.questionDurationMs ?? QUESTION_DURATION_MS;
          // Record answer in local map (correctness resolved at reveal)
          myAnswers = { ...myAnswers, [lastQuestionIndex]: { choice: lastChoice, timeMs: lastTimeMs } };
          // Push answer immediately so host can count it
          await jsPsych.pluginAPI.push({ role: "player", name: myName, answers: myAnswers, totalScore: myTotalScore });
        },
      };

      // 3b. Reveal barrier
      const revealBarrier = {
        type: jsPsychMultiplayerSync,
        wait_for: (group) => hostStepValue(group) >= phaseStep(lastQuestionIndex, PHASES.REVEAL),
        message: "<p>Waiting for results…</p>",
        on_finish: (data) => {
          const state = data.group[hostId];
          lastCorrect = lastChoice !== null && lastChoice === state?.correctChoice;
          lastPointsEarned = scoreAnswer(lastCorrect, lastTimeMs, state?.questionDurationMs ?? QUESTION_DURATION_MS);
          myTotalScore += lastPointsEarned;
        },
      };

      // 3c. Push updated score
      const pushScoreTrial = {
        type: jsPsychCallFunction,
        async: true,
        func: async (done) => {
          await jsPsych.pluginAPI.push({ role: "player", name: myName, answers: myAnswers, totalScore: myTotalScore });
          done();
        },
      };

      // 3d. Reveal display
      const revealDisplay = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: () => {
          const state = jsPsych.pluginAPI.get(hostId);
          const correctText = state?.questionChoices?.[state?.correctChoice] ?? "";
          if (lastChoice === null) {
            return `<p class="result-wrong">Time's up!</p>
                    <p style="margin-top:8px">Correct answer: <strong>${correctText}</strong></p>
                    <p class="total-score">Total: ${myTotalScore} pts</p>`;
          }
          return lastCorrect
            ? `<p class="result-correct">Correct! ✓</p>
               <p class="points-earned">+${lastPointsEarned} points</p>
               <p class="total-score">Total: ${myTotalScore} pts</p>`
            : `<p class="result-wrong">Wrong</p>
               <p style="margin-top:8px">Correct answer: <strong>${correctText}</strong></p>
               <p class="total-score">Total: ${myTotalScore} pts</p>`;
        },
        choices: "NO_KEYS",
        trial_duration: 3000,
      };

      // 3e. Leaderboard barrier
      const leaderboardBarrier = {
        type: jsPsychMultiplayerSync,
        // ENDED has a step above any question, so it satisfies this too.
        wait_for: (group) => hostStepValue(group) >= phaseStep(lastQuestionIndex, PHASES.LEADERBOARD),
        message: "<p>Calculating scores…</p>",
      };

      // 3f. Leaderboard display
      const leaderboardDisplay = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: () => {
          const group = jsPsych.pluginAPI.getAll();
          const standings = computeLeaderboard(group);
          const myRank = standings.findIndex(entry => entry.name === myName) + 1;
          const topThree = standings.slice(0, 3).map((entry, index) =>
            `<p style="font-size:1rem;opacity:0.8">#${index + 1} ${entry.name} — ${entry.totalScore} pts</p>`
          ).join("");
          return `<p style="font-size:1.4rem;font-weight:bold">You are #${myRank}</p>
                  <p style="font-size:1.2rem;margin-bottom:16px">${myTotalScore} points</p>
                  ${topThree}`;
        },
        choices: "NO_KEYS",
        trial_duration: 4000,
      };

      // 3g. Wait for next question or game end
      const nextQuestionBarrier = {
        type: jsPsychMultiplayerSync,
        // Wait for the *next* question to start (or the game to end).
        wait_for: (group) => hostStepValue(group) >= phaseStep(lastQuestionIndex + 1, PHASES.QUESTION),
        message: "<p>Get ready…</p>",
      };

      // Loop wrapping one full question cycle
      const questionLoop = {
        timeline: [questionTrial, revealBarrier, pushScoreTrial, revealDisplay, leaderboardBarrier, leaderboardDisplay, nextQuestionBarrier],
        loop_function: () => jsPsych.pluginAPI.get(hostId)?.phase !== PHASES.ENDED,
      };

      // ── 4. End screen ─────────────────────────────────────────────────────
      const endScreen = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: () => `
          <p style="font-size:2rem;font-weight:bold">Game Over!</p>
          <p style="font-size:1.3rem;margin-top:12px">Final score: <strong>${myTotalScore}</strong> pts</p>
          <p style="margin-top:8px;opacity:0.7">Thanks for playing!</p>`,
        choices: "NO_KEYS",
        trial_duration: 5000,
      };

      await jsPsych.run([nameTrial, lobbyBarrier, questionLoop, endScreen]);
    });
  </script>
</html>
