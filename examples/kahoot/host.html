<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Kahoot Host</title>
    <script src="jatos.js"></script>
    <script src="jatos-adapter.js"></script>
    <script src="protocol.js"></script>
    <script src="questions.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: sans-serif; background: #2d2b55; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
      h1 { font-size: 2rem; margin-bottom: 12px; }
      #view { width: 100%; max-width: 900px; }

      .player-list { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0; }
      .player-chip { background: #46178f; border-radius: 8px; padding: 8px 16px; font-size: 1rem; }

      .question-text { font-size: 2rem; text-align: center; margin-bottom: 24px; background: #46178f; border-radius: 12px; padding: 24px; }
      .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
      .answer-btn { padding: 20px; border-radius: 10px; font-size: 1.2rem; font-weight: bold; text-align: center; color: #fff; cursor: default; }
      .answer-btn.red    { background: #e21b3c; }
      .answer-btn.blue   { background: #1368ce; }
      .answer-btn.yellow { background: #d89e00; }
      .answer-btn.green  { background: #26890c; }
      .answer-btn.correct-highlight { outline: 6px solid #fff; }

      .counter { font-size: 1.5rem; text-align: center; margin-bottom: 8px; }
      .timer   { font-size: 4rem; font-weight: bold; text-align: center; margin-bottom: 24px; }

      .bar-chart { margin: 16px 0; }
      .bar-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
      .bar-label { width: 24px; text-align: center; font-size: 1.1rem; }
      .bar-track { flex: 1; background: rgba(255,255,255,0.15); border-radius: 4px; height: 28px; }
      .bar-fill  { height: 100%; border-radius: 4px; transition: width 0.4s; display: flex; align-items: center; padding-left: 8px; font-weight: bold; min-width: 2px; }

      .leaderboard-list { list-style: none; }
      .leaderboard-list li { display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 20px; margin-bottom: 10px; font-size: 1.2rem; }
      .rank { font-size: 1.5rem; font-weight: bold; width: 36px; }
      .score { margin-left: auto; font-weight: bold; }

      button { padding: 14px 32px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; background: #fff; color: #2d2b55; }
      button:hover { background: #e0e0f0; }
      .btn-row { display: flex; justify-content: center; gap: 16px; margin-top: 20px; }

      .podium { display: flex; align-items: flex-end; justify-content: center; gap: 16px; margin: 24px 0; }
      .podium-slot { display: flex; flex-direction: column; align-items: center; gap: 8px; }
      .podium-block { width: 120px; background: rgba(255,255,255,0.2); border-radius: 8px 8px 0 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; }
      .podium-name { font-size: 1rem; text-align: center; }
      .podium-score { font-size: 0.9rem; opacity: 0.8; }
    </style>
  </head>
  <body>
    <div id="view"><p style="text-align:center">Connecting…</p></div>

    <script>
      jatos.onLoad(async () => {
        const adapter = new jsPsychAdapterMultiplayerJatos();
        await adapter.connect();
        const hostId = adapter.participantId;

        let currentGroup = {};
        let countdownInterval = null;
        let revealScheduled = false;

        await adapter.push({ role: "host", phase: PHASES.LOBBY, step: phaseStep(undefined, PHASES.LOBBY) });
        adapter.subscribe(group => {
          currentGroup = group;
          render(group);
        });

        // subscribe() only fires on *future* group-session updates, so render the
        // current state once now. Without this, players who joined before the host
        // subscribed (i.e. already sitting in the lobby barrier) never appear.
        currentGroup = adapter.getAll();
        render(currentGroup);

        // ── Render dispatcher ───────────────────────────────────────────────
        function render(group) {
          const state = group[hostId];
          if (!state) return;
          switch (state.phase) {
            case PHASES.LOBBY:       renderLobby(group); break;
            case PHASES.QUESTION:    renderQuestion(group); break;
            case PHASES.REVEAL:      renderReveal(group); break;
            case PHASES.LEADERBOARD: renderLeaderboard(group); break;
            case PHASES.ENDED:       renderEnded(group); break;
          }
        }

        // ── Lobby ───────────────────────────────────────────────────────────
        function renderLobby(group) {
          const players = Object.values(group).filter(entry => entry?.role === "player");
          document.getElementById("view").innerHTML = `
            <h1 style="text-align:center;margin-bottom:8px">Waiting for players…</h1>
            <p style="text-align:center;opacity:0.7;margin-bottom:16px">${players.length} joined</p>
            <div class="player-list">${players.map(p => `<div class="player-chip">${p.name}</div>`).join("")}</div>
            <div class="btn-row">
              <button id="startBtn" ${players.length === 0 ? "disabled" : ""}>Start Game</button>
            </div>`;
          document.getElementById("startBtn").onclick = startGame;
        }

        // ── Question ────────────────────────────────────────────────────────
        function renderQuestion(group) {
          const state = group[hostId];
          const players = Object.values(group).filter(e => e?.role === "player");
          const answeredCount = players.filter(p => p.answers?.[state.questionIndex] !== undefined).length;
          const colors = ["red", "blue", "yellow", "green"];
          const symbols = ["▲", "◆", "●", "■"];

          document.getElementById("view").innerHTML = `
            <p style="text-align:center;opacity:0.7;margin-bottom:8px">Question ${state.questionIndex + 1} of ${QUESTIONS.length}</p>
            <div class="question-text">${state.questionPrompt}</div>
            <div class="answer-grid">
              ${state.questionChoices.map((choice, index) => `
                <div class="answer-btn ${colors[index]}">${symbols[index]} ${choice}</div>
              `).join("")}
            </div>
            <div class="counter">${answeredCount} / ${players.length} answered</div>
            <div class="timer" id="timerDisplay"></div>
            <div class="btn-row"><button id="revealBtn">Reveal Now</button></div>`;

          document.getElementById("revealBtn").onclick = () => advanceToReveal();

          // Auto-advance if all answered
          if (players.length > 0 && answeredCount >= players.length && !revealScheduled) {
            revealScheduled = true;
            advanceToReveal();
          }

          // Only restart countdown if not already running
          if (!countdownInterval) startCountdown(state);
        }

        function startCountdown(state) {
          clearInterval(countdownInterval);
          revealScheduled = false;
          const endTime = state.questionStartTime + state.questionDurationMs;
          countdownInterval = setInterval(() => {
            const secondsLeft = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
            const display = document.getElementById("timerDisplay");
            if (display) display.textContent = secondsLeft;
            if (secondsLeft <= 0) {
              clearInterval(countdownInterval);
              countdownInterval = null;
              if (!revealScheduled) {
                revealScheduled = true;
                advanceToReveal();
              }
            }
          }, 250);
        }

        // ── Reveal ──────────────────────────────────────────────────────────
        function renderReveal(group) {
          clearInterval(countdownInterval);
          countdownInterval = null;

          const state = group[hostId];
          const players = Object.values(group).filter(e => e?.role === "player");
          const colors = ["red", "blue", "yellow", "green"];
          const symbols = ["▲", "◆", "●", "■"];

          // Tally answer distribution
          const tally = [0, 0, 0, 0];
          players.forEach(p => {
            const answer = p.answers?.[state.questionIndex];
            if (answer !== undefined) tally[answer.choice]++;
          });
          const maxTally = Math.max(1, ...tally);

          document.getElementById("view").innerHTML = `
            <div class="question-text">${state.questionPrompt}</div>
            <div class="answer-grid">
              ${state.questionChoices.map((choice, index) => `
                <div class="answer-btn ${colors[index]} ${index === state.correctChoice ? "correct-highlight" : ""}">
                  ${index === state.correctChoice ? "✓ " : ""}${symbols[index]} ${choice}
                </div>
              `).join("")}
            </div>
            <div class="bar-chart">
              ${tally.map((count, index) => `
                <div class="bar-row">
                  <div class="bar-label">${symbols[index]}</div>
                  <div class="bar-track">
                    <div class="bar-fill ${colors[index]}" style="width:${Math.round(count / maxTally * 100)}%">
                      ${count > 0 ? count : ""}
                    </div>
                  </div>
                </div>
              `).join("")}
            </div>
            <div class="btn-row"><button id="leaderboardBtn">Show Leaderboard</button></div>`;

          document.getElementById("leaderboardBtn").onclick = advanceToLeaderboard;
        }

        // ── Leaderboard ─────────────────────────────────────────────────────
        function renderLeaderboard(group) {
          const state = group[hostId];
          const standings = computeLeaderboard(group).slice(0, 10);
          const isLast = state.questionIndex >= QUESTIONS.length - 1;

          document.getElementById("view").innerHTML = `
            <h1 style="text-align:center;margin-bottom:16px">Leaderboard</h1>
            <ul class="leaderboard-list">
              ${standings.map((entry, index) => `
                <li>
                  <span class="rank">#${index + 1}</span>
                  <span>${entry.name}</span>
                  <span class="score">${entry.totalScore}</span>
                </li>`).join("")}
            </ul>
            <div class="btn-row">
              <button id="nextBtn">${isLast ? "Show Final Podium" : "Next Question"}</button>
            </div>`;

          document.getElementById("nextBtn").onclick = isLast ? advanceToEnded : advanceToNextQuestion;
        }

        // ── Ended ───────────────────────────────────────────────────────────
        function renderEnded(group) {
          const top3 = computeLeaderboard(group).slice(0, 3);
          const heights = [160, 120, 90];
          const order = [1, 0, 2]; // show 2nd, 1st, 3rd left-to-right

          document.getElementById("view").innerHTML = `
            <h1 style="text-align:center;margin-bottom:8px">Game Over!</h1>
            <div class="podium">
              ${order.map(rank => {
                const entry = top3[rank];
                if (!entry) return "";
                return `
                  <div class="podium-slot">
                    <div class="podium-name">${entry.name}</div>
                    <div class="podium-score">${entry.totalScore} pts</div>
                    <div class="podium-block" style="height:${heights[rank]}px">#${rank + 1}</div>
                  </div>`;
              }).join("")}
            </div>
            <div class="btn-row"><button onclick="jatos.endStudy()">End Study</button></div>`;
        }

        // ── Phase transitions ───────────────────────────────────────────────
        async function startGame() {
          const question = QUESTIONS[0];
          await adapter.push({
            role: "host",
            phase: PHASES.QUESTION,
            questionIndex: 0,
            questionPrompt: question.prompt,
            questionChoices: question.choices,
            questionStartTime: Date.now(),
            questionDurationMs: QUESTION_DURATION_MS,
            step: phaseStep(0, PHASES.QUESTION),
          });
        }

        async function advanceToReveal() {
          clearInterval(countdownInterval);
          countdownInterval = null;
          const state = currentGroup[hostId];
          await adapter.push({
            ...state,
            phase: PHASES.REVEAL,
            correctChoice: QUESTIONS[state.questionIndex].correct,
            step: phaseStep(state.questionIndex, PHASES.REVEAL),
          });
        }

        async function advanceToLeaderboard() {
          const state = currentGroup[hostId];
          await adapter.push({
            ...state,
            phase: PHASES.LEADERBOARD,
            step: phaseStep(state.questionIndex, PHASES.LEADERBOARD),
          });
        }

        async function advanceToNextQuestion() {
          const nextIndex = currentGroup[hostId].questionIndex + 1;
          const question = QUESTIONS[nextIndex];
          clearInterval(countdownInterval);
          countdownInterval = null;
          await adapter.push({
            role: "host",
            phase: PHASES.QUESTION,
            questionIndex: nextIndex,
            questionPrompt: question.prompt,
            questionChoices: question.choices,
            questionStartTime: Date.now(),
            questionDurationMs: QUESTION_DURATION_MS,
            step: phaseStep(nextIndex, PHASES.QUESTION),
          });
        }

        async function advanceToEnded() {
          const state = currentGroup[hostId];
          await adapter.push({
            ...state,
            phase: PHASES.ENDED,
            step: phaseStep(state.questionIndex, PHASES.ENDED),
          });
          jatos.endStudy();
        }
      });
    </script>
  </body>
</html>
